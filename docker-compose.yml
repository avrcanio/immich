name: immich

services:
  immich-server:
    container_name: immich_server
    build:
      context: ./immich-server-patched
      args:
        IMMICH_VERSION: ${IMMICH_VERSION:-v2}
    volumes:
      - ${UPLOAD_LOCATION}:/data
      - /opt/stacks/nextcloud/docker-data/nextcloud/data:/external-libraries/nextcloud-data:ro
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      disable: false
    networks:
      - default
      - postgis
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.immich.rule=Host(`${IMMICH_DOMAIN}`)
      - traefik.http.routers.immich.entrypoints=websecure
      - traefik.http.routers.immich.tls=true
      - traefik.http.routers.immich.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-cloudflare}
      - traefik.http.services.immich.loadbalancer.server.port=2283

  nextcloud-immich-bridge:
    build:
      context: ./nextcloud-immich-bridge
    container_name: nextcloud_immich_bridge
    env_file:
      - .env
    environment:
      IMMICH_API_URL: ${IMMICH_API_URL:-http://immich-server:2283/api}
      BRIDGE_SOURCE_ROOT: ${BRIDGE_SOURCE_ROOT:-/external-libraries/nextcloud-data}
      BRIDGE_LIBRARY_ROOT: ${BRIDGE_LIBRARY_ROOT:-/external-libraries/nextcloud-data}
      BRIDGE_STATE_DIR: /state
      BRIDGE_NEXTCLOUD_CONTAINER_NAME: ${BRIDGE_NEXTCLOUD_CONTAINER_NAME:-nextcloud}
    volumes:
      - /opt/stacks/nextcloud/docker-data/nextcloud/data:/external-libraries/nextcloud-data:ro
      - ./docker-data/bridge:/state
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - immich-server
    restart: unless-stopped

  media-operations:
    build:
      context: ./media-operations
    container_name: immich_media_operations
    env_file:
      - .env
    environment:
      IMMICH_API_URL: ${IMMICH_API_URL:-http://immich-server:2283/api}
      MEDIA_OPS_SOURCE_ROOT: ${MEDIA_OPS_SOURCE_ROOT:-/external-libraries/nextcloud-data}
      MEDIA_OPS_STATE_DIR: /state
      MEDIA_OPS_BRIDGE_STATE_DIR: /bridge-state
      MEDIA_OPS_PORT: ${MEDIA_OPS_PORT:-8091}
      MEDIA_OPS_DRY_RUN: ${MEDIA_OPS_DRY_RUN:-true}
      MEDIA_OPS_WRITEBACK_ENABLED: ${MEDIA_OPS_WRITEBACK_ENABLED:-false}
      MEDIA_OPS_DELETE_ENABLED: ${MEDIA_OPS_DELETE_ENABLED:-false}
      MEDIA_OPS_FOLDER_MOVE_ENABLED: ${MEDIA_OPS_FOLDER_MOVE_ENABLED:-false}
      MEDIA_OPS_NEXTCLOUD_ALBUM_WRITEBACK_ENABLED: ${MEDIA_OPS_NEXTCLOUD_ALBUM_WRITEBACK_ENABLED:-false}
      MEDIA_OPS_NEXTCLOUD_CONTAINER_NAME: ${MEDIA_OPS_NEXTCLOUD_CONTAINER_NAME:-nextcloud}
      MEDIA_OPS_INTERNAL_EVENT_SECRET: ${MEDIA_OPS_INTERNAL_EVENT_SECRET}
      MEDIA_OPS_NEXTCLOUD_TRASH_SYNC_ENABLED: ${MEDIA_OPS_NEXTCLOUD_TRASH_SYNC_ENABLED:-false}
      MEDIA_OPS_NEXTCLOUD_TRASH_RESTORE_ENABLED: ${MEDIA_OPS_NEXTCLOUD_TRASH_RESTORE_ENABLED:-false}
      MEDIA_OPS_SMART_ALBUMS_ENABLED: ${MEDIA_OPS_SMART_ALBUMS_ENABLED:-false}
      MEDIA_OPS_SMART_ALBUMS_DRY_RUN: ${MEDIA_OPS_SMART_ALBUMS_DRY_RUN:-true}
      MEDIA_OPS_SMART_ALBUMS_DOCUMENTS_ENABLED: ${MEDIA_OPS_SMART_ALBUMS_DOCUMENTS_ENABLED:-true}
      MEDIA_OPS_SMART_ALBUMS_SCREENSHOTS_ENABLED: ${MEDIA_OPS_SMART_ALBUMS_SCREENSHOTS_ENABLED:-true}
      MEDIA_OPS_SMART_ALBUMS_WHATSAPP_ENABLED: ${MEDIA_OPS_SMART_ALBUMS_WHATSAPP_ENABLED:-true}
      MEDIA_OPS_UTILITY_TIMEZONE: ${MEDIA_OPS_UTILITY_TIMEZONE:-Europe/Zagreb}
    volumes:
      - /opt/stacks/nextcloud/docker-data/nextcloud/data:/external-libraries/nextcloud-data
      - ./docker-data/bridge:/bridge-state:ro
      - ./docker-data/media-operations:/state
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - immich-server
    restart: unless-stopped
    networks:
      - default
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.immich-exifdatefix-api.rule=Host(`${IMMICH_DOMAIN}`) && PathPrefix(`/utilities/exifdatefix/api`)
      - traefik.http.routers.immich-exifdatefix-api.priority=100
      - traefik.http.routers.immich-exifdatefix-api.entrypoints=websecure
      - traefik.http.routers.immich-exifdatefix-api.tls=true
      - traefik.http.routers.immich-exifdatefix-api.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-cloudflare}
      - traefik.http.services.immich-exifdatefix-api.loadbalancer.server.port=8091

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-v2}
    volumes:
      - model-cache:/cache
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      disable: false

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9@sha256:3eeb09785cd61ec8e3be35f8804c8892080f3ca21934d628abc24ee4ed1698f6
    healthcheck:
      test: redis-cli ping || exit 1
    restart: unless-stopped

volumes:
  model-cache:

networks:
  postgis:
    external: true
  proxy:
    external: true
